name: internal_billing_khata_mobile
description: Internal billing and khata mobile app
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  cryptography: ^2.7.0
  drift: ^2.26.0
  file_picker: ^11.0.2
  flutter_secure_storage: ^9.2.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.0
  share_plus: ^10.0.0
  sqlite3_flutter_libs: ^0.5.32
  url_launcher: ^6.3.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.2
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  workmanager: ^0.9.0+3
  fl_chart: ^1.2.0

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/catalog/preinstalled_catalog.json
